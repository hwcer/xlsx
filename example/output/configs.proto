syntax = "proto3";
option go_package = "./;configs";
option csharp_namespace = "Cosnet.configs";
package protoc;

//全局对象......
//sign:IdInt32NumInt32
message IdInt32NumInt32{ 
	int32 id = 1; 
	int32 num = 2; 
}
//sign:IdInt32NumInt32PerInt32
message IdInt32NumInt32PerInt32{ 
	int32 id = 1; 
	int32 num = 2; 
	int32 per = 3; 
}

//数据对象......

// Sheet:
// File:\测试表.xlsx
message Activity{
	int32 id = 1; //活动
	string TType = 2; //时间格式
	repeated int32 Arr = 3; //
	IdInt32NumInt32PerInt32 Obj = 4; //
	repeated IdInt32NumInt32 ArrObj = 5; //id
	repeated float ArrFloat = 6; //1.1
}

message summary{
	map<int32,Activity> Activity=1;
}
